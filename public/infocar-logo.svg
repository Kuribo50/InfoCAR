<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle background -->
  <circle cx="20" cy="20" r="20" fill="#f8f9fa" stroke="#e9ecef" stroke-width="1"/>
  
  <!-- Main logo design -->
  <g transform="translate(8, 8)">
    <!-- Teal/Turquoise section -->
    <path d="M12 2 C16 2 20 6 20 12 C20 14 19 16 17 17 L12 12 Z" fill="#20b2aa"/>
    <circle cx="16" cy="6" r="2" fill="#48cae4"/>
    
    <!-- Green section -->
    <path d="M2 12 C2 8 6 4 12 4 C14 4 16 5 17 7 L12 12 Z" fill="#8fbc8f"/>
    <circle cx="6" cy="8" r="2" fill="#90ee90"/>
    
    <!-- Blue section -->
    <path d="M12 22 C8 22 4 18 4 12 C4 10 5 8 7 7 L12 12 Z" fill="#4682b4"/>
    <circle cx="8" cy="16" r="2" fill="#87ceeb"/>
    
    <!-- Center medical cross -->
    <g transform="translate(10, 10)">
      <circle cx="2" cy="2" r="3" fill="white" stroke="#e9ecef" stroke-width="0.5"/>
      <!-- Horizontal bar -->
      <rect x="0.5" y="1.5" width="3" height="1" fill="#28a745" rx="0.2"/>
      <!-- Vertical bar -->
      <rect x="1.5" y="0.5" width="1" height="3" fill="#28a745" rx="0.2"/>
    </g>
  </g>
  
  <!-- Bottom progress bar -->
  <g transform="translate(4, 30)">
    <rect x="0" y="0" width="32" height="3" fill="#e9ecef" rx="1.5"/>
    <rect x="0" y="0" width="6" height="3" fill="#20b2aa" rx="1.5"/>
    <rect x="7" y="0" width="5" height="3" fill="#ffc107" rx="1.5"/>
    <rect x="13" y="0" width="4" height="3" fill="#87ceeb" rx="1.5"/>
    <rect x="18" y="0" width="6" height="3" fill="#8fbc8f" rx="1.5"/>
    <rect x="25" y="0" width="7" height="3" fill="#dc3545" rx="1.5"/>
  </g>
</svg>